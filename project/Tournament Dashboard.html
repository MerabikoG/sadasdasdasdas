<!doctype html>
<html lang="ka">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ფეხბურთის ლიგა · Tournament Dashboard</title>
<link rel="stylesheet" href="styles.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="pages-1.jsx"></script>
<script type="text/babel" src="pages-2.jsx"></script>
</head>
<body data-theme="dark">
<a href="#main" class="skip">გადავიდე მთავარ შინაარსზე</a>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "layout": "sidebar"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [page, setPage] = useState('standings');
  const [teamId, setTeamId] = useState('din');

  useEffect(() => {
    document.body.dataset.theme = t.theme;
  }, [t.theme]);

  return (
    <div className="app" data-layout={t.layout} data-theme={t.theme}>
      {t.layout === 'sidebar' && <Sidebar page={page} setPage={setPage} />}
      <div className="main" id="main">
        {t.layout === 'topnav' && <TopNav page={page} setPage={setPage} />}
        <TopBar page={page} />
        {page === 'standings' && <StandingsPage setPage={setPage} setTeamId={setTeamId} />}
        {page === 'fixtures' && <FixturesPage setPage={setPage} />}
        {page === 'live' && <LivePage />}
        {page === 'team' && <TeamPage teamId={teamId} setTeamId={setTeamId} setPage={setPage} />}
        {page === 'players' && <PlayersPage setPage={setPage} setTeamId={setTeamId} />}
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="გარეგნობა" />
        <TweakRadio label="თემა" value={t.theme}
          options={[{value:'dark',label:'მუქი'},{value:'light',label:'ღია'}]}
          onChange={(v) => setTweak('theme', v)} />
        <TweakRadio label="ლეიაუტი" value={t.layout}
          options={[{value:'sidebar',label:'გვერდითი'},{value:'topnav',label:'ზედა'}]}
          onChange={(v) => setTweak('layout', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
