<!doctype html>
<html lang="ka">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ეროვნული ლიგა · ოფიციალური საიტი</title>
<link rel="stylesheet" href="public.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<!-- borrow FormPills from components.jsx -->
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="public-pages-1.jsx"></script>
<script type="text/babel" src="public-pages-2.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const PUB_NAV = [
  { id: 'home', label: 'მთავარი' },
  { id: 'match', label: 'ლაივი' },
  { id: 'tickets', label: 'ბილეთები' },
  { id: 'team', label: 'გუნდები' },
  { id: 'news', label: 'სიახლეები' },
];

function App() {
  const [page, setPage] = useState('home');
  const [teamId, setTeamId] = useState('din');
  const [playerId, setPlayerId] = useState('p1');
  const [articleId, setArticleId] = useState('n1');
  const [menuOpen, setMenuOpen] = useState(false);
  const [leagueData, setLeagueData] = useState(null);

  const go = (p, id) => {
    setPage(p);
    if (p === 'league') setLeagueData(id);
    if (p === 'team') setTeamId(id || 'din');
    if (p === 'player') setPlayerId(id || 'p1');
    if (p === 'article') setArticleId(id || 'n1');
    setMenuOpen(false);
    window.scrollTo({top:0, behavior:'instant'});
  };

  return (
    <div className="pub-page">
      <nav className="pub-nav">
        <div className="pub-nav-inner">
          <div className="pub-brand" onClick={()=>go('home')} style={{cursor:'pointer'}}>
            <div className="pub-brand-mark">ლ</div>
            <div className="pub-brand-name">ლიგა<small>EROVNULI LIGA</small></div>
          </div>
          <div className={`pub-nav-links ${menuOpen?'open':''}`}>
            {PUB_NAV.map(n => (
              <button key={n.id} className="pub-nav-link"
                aria-current={(page===n.id || (n.id==='team' && page==='player') || (n.id==='news' && page==='article'))?'page':undefined}
                onClick={()=>go(n.id)}>{n.label}</button>
            ))}
          </div>
          <div className="pub-nav-spacer" />
          <div className="pub-nav-cta">
            <a className="admin-link" href="Tournament Dashboard.html" title="ადმინ პანელი">⚙ ადმინი</a>
            <button className="pub-btn" onClick={()=>go('match')}>● ლაივი</button>
            <button className="pub-btn primary" onClick={()=>go('tickets')}>ბილეთი</button>
            <button className="pub-burger" onClick={()=>setMenuOpen(o=>!o)} aria-label="მენიუ">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
            </button>
          </div>
        </div>
      </nav>

      {page === 'home'   && <PubHomePage go={go} />}
      {page === 'league' && <PubLeaguePage league={leagueData} go={go} />}
      {page === 'match' && <PubMatchPage go={go} />}
      {page === 'tickets' && <PubTicketsPage go={go} />}
      {page === 'team' && <PubTeamPage teamId={teamId} go={go} />}
      {page === 'player' && <PubPlayerPage playerId={playerId} go={go} />}
      {page === 'news' && <PubNewsListPage go={go} />}
      {page === 'article' && <PubArticlePage articleId={articleId} go={go} />}

      <PubFooter />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
